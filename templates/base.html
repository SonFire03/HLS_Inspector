<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HLS Inspector{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="page-backdrop page-backdrop-grid"></div>
    <div class="page-backdrop page-backdrop-orb page-backdrop-a"></div>
    <div class="page-backdrop page-backdrop-orb page-backdrop-b"></div>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
